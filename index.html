<!DOCTYPE html>


<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageCompressor - 图片压缩工具</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <h1>ImageCompressor</h1>
                </div>
                <p class="tagline">快速、安全、本地处理</p>
            </div>
            <button class="dark-mode-toggle" id="darkModeToggle" aria-label="切换到深色模式">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"></path>
                </svg>
            </button>
        </header>

        <main class="main">
            <div class="upload-area" id="uploadArea">
                <div class="upload-content">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h2>拖拽图片到这里</h2>
                    <p>或者点击选择文件</p>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                    <button class="upload-btn" id="uploadBtn">选择图片</button>
                </div>
            </div>

            <div class="settings" id="settings">
                <div class="setting-group">
                    <label class="setting-label">压缩质量</label>
                    <div class="quality-slider">
                        <input type="range" id="qualityRange" min="10" max="100" value="80" step="5">
                        <span class="quality-value" id="qualityValue">80%</span>
                    </div>
                    <div class="quality-presets">
                        <button class="preset-btn" data-value="90">最佳</button>
                        <button class="preset-btn active" data-value="80">良好</button>
                        <button class="preset-btn" data-value="60">普通</button>
                        <button class="preset-btn" data-value="40">最小</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label class="setting-label">输出格式</label>
                    <div class="format-options">
                        <button class="format-btn active" data-format="original">原始格式</button>
                        <button class="format-btn" data-format="jpeg">JPEG</button>
                        <button class="format-btn" data-format="png">PNG</button>
                        <button class="format-btn" data-format="webp">WebP</button>
                    </div>
                    <p class="format-hint">PNG图片将自动转换为WebP以获得更好的压缩效果</p>
                </div>

                <div class="setting-group">
                    <label class="setting-label">最大尺寸</label>
                    <div class="size-options">
                        <button class="size-btn active" data-size="0">保持原始</button>
                        <button class="size-btn" data-size="1920">1920px</button>
                        <button class="size-btn" data-size="1280">1280px</button>
                        <button class="size-btn" data-size="800">800px</button>
                    </div>
                </div>
            </div>

            <div class="preview-section" id="previewSection" style="display: none;">
                <div class="section-header">
                    <h3>压缩结果</h3>
                    <button class="clear-btn" id="clearBtn">清空</button>
                </div>
                
                <div class="preview-grid" id="previewGrid">
                </div>

                <div class="summary" id="summary">
                    <div class="summary-item">
                        <span class="summary-label">原始大小</span>
                        <span class="summary-value" id="originalSize">0 KB</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">压缩后</span>
                        <span class="summary-value" id="compressedSize">0 KB</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">节省空间</span>
                        <span class="summary-value saved" id="savedSize">0%</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn secondary" id="downloadAllBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        全部下载
                    </button>
                    <button class="action-btn primary" id="compressBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M8 12l2 2 4-4"></path>
                        </svg>
                        重新压缩
                    </button>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>所有处理均在本地完成，您的图片不会上传到服务器</p>
        </footer>
    </div>

    <div class="toast" id="toast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span id="toastMessage">操作成功</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
